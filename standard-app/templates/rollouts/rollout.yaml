{{ range $appName, $appConfig := .Values.apps }}
{{- if $appConfig.rollout }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ $appName }}
  namespace: {{ $.Release.Namespace }}
  {{- with $appConfig.rollout.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  workloadRef: 
    apiVersion: apps/v1
    kind: {{ $appConfig.rollout.kind | default "Deployment" }}
    name: {{ $appName }}
    scaleDown: {{ $appConfig.rollout.scaleDown | default "progressively" }}
  strategy:
    {{- toYaml $appConfig.rollout.strategy | nindent 4 }}
---
{{- end }}
{{- end }}
