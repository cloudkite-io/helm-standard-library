{{ range $appName, $appConfig := .Values.apps }}
{{- if $appConfig.rollout }}
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: {{ $appName }}
  namespace: {{ $.Release.Namespace }}
  annotations:
    {{- with $appConfig.rollout.annotations }}
    {{- toYaml | nindent 4 }}
    {{- end }}
spec:
  workloadRef: 
    apiVersion: apps/v1
    kind: Deployment
    name: {{ $appName }}
    scaleDown: progressively
  strategy:
    {{- toYaml $appConfig.rollout.strategy | nindent 4 }}
---
{{- end }}
{{- end }}
