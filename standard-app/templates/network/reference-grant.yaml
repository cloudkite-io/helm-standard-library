{{- range $borrowerNamespace := .Values.referenceGrants }}
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: {{ $.Release.Namespace }}-svc-rg-{{ $borrowerNamespace }}
spec:
  from:
  - group: gateway.networking.k8s.io
    kind: HTTPRoute
    namespace: {{ $borrowerNamespace }}
  to:
  - group: ""
    kind: Service
---
{{- end }}
